# Định nghĩa các "profile" (bản resume theo từng vai trò) render từ content/profile.yaml.
# Mỗi profile override: title hiển thị, SEO, và danh sách section được render (theo đúng thứ tự = thứ tự nav).
#
# Section id hợp lệ (khớp với dữ liệu trong profile.yaml):
#   summary | skills | experience | ai_automation_expertise | projects | achievements | education
#
# Lưu ý: bản build-html.js cũ có field `skip_sections` nhưng chưa từng được code build đọc tới (dead data).
# Ở thiết kế mới, `sections` là allowlist tường minh và thực sự được scripts/build.rs dùng để render + build nav.

default: ai-automation

profiles:
  - id: ai-automation
    title: "Software Engineer (Fullstack)"
    seo:
      description: "Văn Minh Huy - Fullstack Software Engineer specializing in AI/ML integration, automation, and full-stack development"
      keywords: "Software Engineer, Fullstack Developer, AI Integration, Machine Learning, DevOps, Flutter, React, Python"
      author: "Văn Minh Huy"
    sections: [summary, experience, projects, education]

  - id: mobile
    title: "Software Engineer (Fullstack)"
    seo:
      description: "Văn Minh Huy - Fullstack Software Engineer specializing in AI/ML integration, automation, and full-stack development"
      keywords: "Software Engineer, Fullstack Developer, AI Integration, Machine Learning, DevOps, Flutter, React, Python"
      author: "Văn Minh Huy"
    sections: [summary, experience, projects, education]

  - id: ios
    title: "Senior Mobile Developer | CI/CD Specialist"
    seo:
      description: "Văn Minh Huy - Senior Mobile Developer specializing in iOS, Native development and CI/CD automation."
      keywords: "iOS Developer, SwiftUI, Fastlane, CI/CD, Mobile Engineer"
      author: "Văn Minh Huy"
    sections: [summary, skills, experience, projects, achievements, education]

  - id: android
    title: "Senior Software Engineer | Kotlin, Flutter & IoT Specialist"
    seo:
      description: "Văn Minh Huy - Senior Software Engineer specializing in Kotlin, Flutter and IoT device integration."
      keywords: "Android Developer, Kotlin, Jetpack Compose, Flutter, IoT, Mobile Engineer"
      author: "Văn Minh Huy"
    sections: [summary, skills, experience, projects, achievements, education]

  - id: standard
    title: "Senior Mobile Developer | Team Lead"
    seo:
      description: "Văn Minh Huy - Senior Mobile Developer and Team Lead with 3.5+ years of experience."
      keywords: "Mobile Developer, Team Lead, Flutter, React Native, Senior Engineer"
      author: "Văn Minh Huy"
    sections: [summary, skills, experience, projects, achievements, education]

  - id: xamarin
    title: "Mobile Developer"
    seo:
      description: "Văn Minh Huy - Mobile Developer with production experience in Xamarin, Flutter and React Native."
      keywords: "Xamarin, C#, Mobile Developer, Cross-platform, Flutter, React Native"
      author: "Văn Minh Huy"
    sections: [summary, skills, experience, projects, achievements, education]

  - id: full-portfolio
    title: "Senior Mobile Developer | Full Project Portfolio"
    seo:
      description: "Văn Minh Huy - Full project portfolio across mobile, web, AI and DevOps engineering."
      keywords: "Portfolio, Mobile Developer, Fullstack Engineer, AI Integration, DevOps"
      author: "Văn Minh Huy"
    sections: [summary, skills, experience, ai_automation_expertise, projects, achievements, education]

  - id: teaching
    title: "Software Engineering Instructor & Mentor | Fullstack, Mobile & AI"
    seo:
      description: "Văn Minh Huy - Software engineering instructor and mentor, bringing 4+ years of fullstack development and 3.5 years leading an 8-person engineering team into the classroom."
      keywords: "Software Engineering Instructor, Technical Mentor, Coding Bootcamp Instructor, Programming Teacher, Fullstack Engineer, Engineering Team Lead"
      author: "Văn Minh Huy"
    summary:
      - "After 4+ years as a fullstack software engineer and 3.5 years leading an 8-person mobile engineering team, I'm moving toward technical teaching and mentorship. The developer job market has grown intensely competitive as AI reshapes how software gets built, and I see teaching as the right response: it gives me dedicated time to go deeper into AI, a structured way to pass on real production experience — architecture, DevOps, code quality, team leadership — to the next generation of engineers, and a discipline that forces me to keep revisiting and sharpening my own software engineering fundamentals."
      - "My background spans mobile (Flutter, React Native, Kotlin, SwiftUI), full-stack web (React/Next.js, FastAPI, NestJS, Golang), and hands-on AI/LLM integration, with direct experience mentoring a team through code review, architecture decisions, and delivery under real deadlines — the same skills that translate into teaching engineers who can actually ship."
    sections: [summary, experience, skills, projects, achievements, education]
