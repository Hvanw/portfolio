name: Build Profile HTML

on:
  push:
    paths:
      - 'complete-profile.md'
      - 'profile-metadata.yaml'
    branches:
      - portfolio
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build HTML
        run: npm run build
      
      - name: Create preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-html
          path: index.html
          retention-days: 7
      
      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: Commit and Push changes
        run: |
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-update index.html from source files"
            git push
          fi
